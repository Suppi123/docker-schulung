events {
    worker_connections 1024;
}

http {
    # Große Datei-Uploads erlauben (Foto-Upload via FileBrowser)
    client_max_body_size 500M;

    # Docker-interner DNS-Resolver.
    # Nginx löst Upstream-Hostnamen standardmäßig beim Start auf – schlägt
    # das fehl (weil der Ziel-Container noch nicht bereit ist), crasht nginx.
    # Mit „resolver" und einer Variable als proxy_pass-Ziel wird die
    # Auflösung stattdessen bei jeder Anfrage durchgeführt.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # ──────────────────────────────────────────────────────────────
        # /photos/ → PhotoPrism
        #
        # proxy_pass ohne trailing slash: nginx leitet die vollständige
        # URI (inkl. /photos/...) unverändert weiter. PhotoPrism erwartet
        # genau diesen Pfad-Prefix, da PHOTOPRISM_SITE_URL entsprechend
        # gesetzt ist.
        #
        # WebSocket-Unterstützung ist nötig, damit das Live-Update-Feature
        # von PhotoPrism funktioniert.
        # ──────────────────────────────────────────────────────────────
        location /photos/ {
            set $upstream_photoprism http://photoprism:2342;
            proxy_pass $upstream_photoprism;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket-Support
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout 300s;
        }

        # ──────────────────────────────────────────────────────────────
        # /files/ → FileBrowser
        #
        # Gleiche Logik: vollständige URI wird weitergeleitet.
        # FileBrowser ist mit --baseURL /files konfiguriert und
        # erwartet diesen Pfad-Prefix.
        # ──────────────────────────────────────────────────────────────
        location /files/ {
            set $upstream_filebrowser http://filebrowser;
            proxy_pass $upstream_filebrowser;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
        }
    }
}
