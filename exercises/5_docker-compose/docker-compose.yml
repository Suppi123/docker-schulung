services:
  client-react-nginx:
    image: client-react-nginx
    build:
      context: ../4_application/client-react
    networks:
      - ?
    ports:
      - 80:8080
    restart: unless-stopped
  api-node:
    image: api-node
    build:
      context: ../4_application/api-node
    depends_on:
      - ?
    environment:
      - DATABASE_URL=postgres://postgres:foobarbaz@db:5432/postgres
    networks:
      - frontend
      - backend
    ports:
      - 3000:3000
    restart: unless-stopped
  api-golang:
    image: api-golang
    build:
      context: ../4_application/api-golang
    depends_on:
      - db
    environment:
      - DATABASE_URL=?
    networks:
      - frontend
      - backend
    ports:
      - 8080:8080
    restart: unless-stopped
  db:
    image: postgres:15.1-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=foobarbaz
    networks:
      - ?
    ports:
      - 5432:5432

volumes:
  ?

networks:
  frontend:
  backend: