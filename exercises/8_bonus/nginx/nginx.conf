events {
    worker_connections 1024;
}

http {
    # Große Datei-Uploads erlauben (Foto-Upload via FileBrowser)
    client_max_body_size 500M;

    server {
        listen 80;

        # ──────────────────────────────────────────────────────────────
        # /photos/ → PhotoPrism
        #
        # proxy_pass ohne trailing slash: nginx leitet die vollständige
        # URI (inkl. /photos/...) unverändert weiter. PhotoPrism erwartet
        # genau diesen Pfad-Prefix, da PHOTOPRISM_SITE_URL entsprechend
        # gesetzt ist.
        #
        # WebSocket-Unterstützung ist nötig, damit das Live-Update-Feature
        # von PhotoPrism funktioniert.
        # ──────────────────────────────────────────────────────────────
        location /photos/ {
            proxy_pass http://photoprism:2342;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket-Support
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout 300s;
        }

        # ──────────────────────────────────────────────────────────────
        # /files/ → FileBrowser
        #
        # Gleiche Logik: vollständige URI wird weitergeleitet.
        # FileBrowser ist mit FB_BASEURL=/files konfiguriert und
        # erwartet diesen Pfad-Prefix.
        # ──────────────────────────────────────────────────────────────
        location /files/ {
            proxy_pass http://filebrowser;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
        }
    }
}
